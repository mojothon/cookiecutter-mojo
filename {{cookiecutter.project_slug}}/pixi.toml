[project]
authors = ["{{cookiecutter.full_name}}<{{cookiecutter.email}}>"]
channels = [
    "https://conda.modular.com/max-nightly", 
    "conda-forge", 
    "https://repo.prefix.dev/modular-community", 
    "https://prefix.dev/mojo-force"
]
description = "{{cookiecutter.project_short_description}}"
name = "{{cookiecutter.project_slug}}"
platforms = ["linux-64"]  # TODO: add other platforms "osx-arm64", 
version = "{{cookiecutter.version}}"


[tasks]
test = "pixi run mojo run tests/test_main.mojo"
build = "rattler-build build -r src -c https://prefix.dev/mojo-force -c https://repo.prefix.dev/modular-community -c https://conda.modular.com/max-nightly -c conda-forge --skip-existing=all"
publish = { cmd = "bash scripts/publish.sh", env = { PREFIX_API_KEY = "$PREFIX_API_KEY" } }

[dependencies]
mojo = ">=0.25.7.0.dev2025101305,<0.26"
python = ">=3.10,==3.12"